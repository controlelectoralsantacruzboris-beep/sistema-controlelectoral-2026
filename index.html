<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mapa Electoral 2026</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d1117;--panel:#161b22;--brd:#30363d;--gold:#f0b429;--red:#ef4444;--grn:#22c55e;--ylw:#facc15;--txt:#e6edf3;--mut:#7d8590;--hvr:#21262d;}
html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;font-family:'Inter',sans-serif;background:#0d1117;color:#e6edf3;}
*{box-sizing:border-box;}
#wrap{display:flex;width:100vw;height:100vh;}
#map{flex:1;height:100vh;min-width:0;}
#sidebar{width:320px;min-width:320px;height:100vh;background:var(--panel);border-left:1px solid var(--brd);display:flex;flex-direction:column;overflow:hidden;}
#topbar{position:fixed;top:12px;left:0;right:320px;display:flex;flex-direction:column;gap:8px;align-items:center;z-index:1000;pointer-events:none;}
.swrap{position:relative;pointer-events:all;}
.sicon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--mut);font-size:13px;}
.sbox{background:rgba(13,17,23,.96);border:1px solid var(--brd);color:var(--txt);border-radius:24px;padding:10px 16px 10px 36px;font-size:13px;font-family:'Inter',sans-serif;width:320px;outline:none;backdrop-filter:blur(10px);}
.sbox:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(240,180,41,.15);}
.sbox::placeholder{color:var(--mut);}
.drop{position:absolute;top:calc(100% + 5px);left:0;width:100%;background:var(--panel);border:1px solid var(--brd);border-radius:8px;max-height:260px;overflow-y:auto;z-index:3000;box-shadow:0 8px 24px rgba(0,0,0,.7);display:none;}
.drop.open{display:block;}
.ditem{padding:9px 14px;font-size:13px;cursor:pointer;border-bottom:1px solid var(--brd);display:flex;align-items:center;gap:8px;transition:background .1s;}
.ditem:last-child{border-bottom:none;}
.ditem:hover{background:var(--hvr);}
.dname{flex:1;}
.tag{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:700;letter-spacing:.4px;white-space:nowrap;}
.tc{background:rgba(239,68,68,.18);color:#ef4444;}
.tn{background:rgba(34,197,94,.18);color:#22c55e;}
.ti{background:rgba(250,204,21,.18);color:#facc15;}
.td{background:rgba(240,180,41,.1);color:#f0b429;font-size:9px;}
.shead{padding:16px;border-bottom:1px solid var(--brd);background:var(--bg);}
.slogo{font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;color:var(--gold);letter-spacing:1px;}
.ssub{font-size:10px;color:var(--mut);margin-top:2px;}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:12px;border-bottom:1px solid var(--brd);}
.sc{background:#0d1117;border:1px solid var(--brd);border-radius:8px;padding:10px 12px;}
.sv{font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:700;color:var(--gold);}
.sl{font-size:10px;color:var(--mut);margin-top:2px;}
.legend{display:flex;gap:14px;padding:8px 12px;border-bottom:1px solid var(--brd);}
.li{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--mut);}
.ld{width:10px;height:10px;border-radius:50%;}
.tabs{display:flex;border-bottom:1px solid var(--brd);}
.tab{flex:1;padding:10px;font-size:12px;font-weight:500;text-align:center;cursor:pointer;color:var(--mut);border-bottom:2px solid transparent;transition:all .2s;}
.tab:hover{color:var(--txt);background:var(--hvr);}
.tab.active{color:var(--gold);border-bottom-color:var(--gold);}
.tcont{display:none;flex:1;flex-direction:column;overflow:hidden;min-height:0;}
.tcont.active{display:flex;}
.lscroll{flex:1;overflow-y:auto;padding:8px;}
.lscroll::-webkit-scrollbar{width:4px;}
.lscroll::-webkit-scrollbar-thumb{background:var(--brd);border-radius:2px;}
.ri{padding:9px 10px;border-radius:8px;border:1px solid var(--brd);margin-bottom:5px;cursor:pointer;display:flex;align-items:flex-start;gap:8px;background:#0d1117;transition:border-color .15s;}
.ri:hover{border-color:var(--gold);}
.ri.inc{border-color:var(--ylw)!important;background:rgba(250,204,21,.05)!important;}
.rdot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:3px;}
.rbody{flex:1;min-width:0;}
.rname{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rmeta{font-size:10px;color:var(--mut);margin-top:2px;}
#det{display:none;flex-direction:column;gap:8px;border-top:1px solid var(--brd);background:#0d1117;padding:14px;flex-shrink:0;}
#det.open{display:flex;}
.dtn{font-family:'Rajdhani',sans-serif;font-size:17px;font-weight:700;line-height:1.2;}
.dtg{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.dtc{background:var(--panel);border:1px solid var(--brd);border-radius:6px;padding:7px 10px;}
.dtl{font-size:9px;color:var(--mut);text-transform:uppercase;letter-spacing:.5px;}
.dtv{font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;margin-top:1px;}
.bincid{background:transparent;border:1px solid var(--ylw);color:var(--ylw);border-radius:6px;padding:9px;font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;letter-spacing:1px;cursor:pointer;width:100%;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .2s;}
.bincid:hover{background:rgba(250,204,21,.1);}
.bincid.on{background:var(--ylw);color:#000;}
.bclose{background:none;border:none;color:var(--mut);font-size:11px;cursor:pointer;align-self:flex-end;text-decoration:underline;}
.brig{background:#0d1117;border:1px solid var(--brd);border-left:3px solid var(--gold);padding:8px 10px;margin-bottom:5px;border-radius:8px;}
.bn{font-size:12px;font-weight:600;}
.bm{font-size:10px;color:var(--mut);margin-top:3px;display:flex;gap:10px;}
.ibadge{background:var(--ylw);color:#000;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;margin-left:4px;}
.iitem{background:rgba(250,204,21,.05);border:1px solid rgba(250,204,21,.25);border-radius:8px;padding:9px 10px;margin-bottom:5px;cursor:pointer;}
.iitem:hover{background:rgba(250,204,21,.1);}
.ihdr{font-weight:600;color:var(--ylw);font-size:12px;}
.imeta{color:var(--mut);font-size:10px;margin-top:3px;}

/* Filtro brigadas por distrito */
.dist-filter{display:flex;flex-wrap:wrap;gap:4px;padding:8px;border-bottom:1px solid var(--brd);}
.dbtn{background:var(--bg);border:1px solid var(--brd);color:var(--mut);border-radius:12px;padding:3px 9px;font-size:10px;font-weight:600;cursor:pointer;transition:all .15s;}
.dbtn:hover{border-color:var(--gold);color:var(--txt);}
.dbtn.active{background:var(--gold);color:#000;border-color:var(--gold);}

/* Leyenda distritos */
#leyendaDist{position:absolute;bottom:20px;left:10px;z-index:900;background:rgba(13,17,23,.92);border:1px solid #30363d;border-radius:8px;padding:10px 12px;font-size:11px;max-width:160px;backdrop-filter:blur(8px);}
#leyendaDist .ld-title{font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;color:#f0b429;margin-bottom:6px;}
.ld-item{display:flex;align-items:center;gap:6px;margin-bottom:3px;color:#e6edf3;}
.ld-color{width:12px;height:12px;border-radius:2px;flex-shrink:0;}

/* Popup oscuro Leaflet */
.leaflet-popup-content-wrapper{background:#161b22!important;color:#e6edf3!important;border:1px solid #30363d!important;border-radius:10px!important;font-family:'Inter',sans-serif!important;box-shadow:0 8px 28px rgba(0,0,0,.7)!important;}
.leaflet-popup-content{margin:14px 16px!important;}
.leaflet-popup-tip{background:#161b22!important;}
.leaflet-popup-close-button{color:#7d8590!important;}
.leaflet-popup-close-button:hover{color:#e6edf3!important;}

/* ── MOBILE ── */
@media (max-width: 768px) {
  html, body { overflow: hidden; width: 100%; height: 100%; }

  #wrap {
    flex-direction: column;
    position: relative;
    width: 100vw;
    height: 100vh;
  }

  /* Mapa ocupa toda la pantalla de fondo */
  #map {
    position: absolute;
    top: 0; left: 0;
    width: 100vw;
    height: 100vh;
    z-index: 1;
  }

  /* Buscadores arriba */
  #topbar {
    position: fixed;
    top: 10px; left: 0; right: 0;
    z-index: 1000;
    pointer-events: none;
    gap: 6px;
  }
  .swrap { pointer-events: all; }
  .sbox { width: 230px; font-size: 12px; padding: 8px 14px 8px 32px; }

  /* Leyenda distritos */
  #leyendaDist {
    bottom: 130px;
    left: 6px;
    z-index: 600;
    font-size: 10px;
    max-width: 120px;
    padding: 6px 8px;
  }
  #leyendaDist .ld-title { font-size: 11px; margin-bottom: 4px; }
  .ld-item { margin-bottom: 2px; }

  /* ── BOTTOM SHEET ── */
  #sidebar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    width: 100vw !important;
    min-width: unset !important;
    height: 56px;
    max-height: 70vh;
    border-left: none;
    border-top: 2px solid var(--brd);
    border-radius: 16px 16px 0 0;
    background: var(--panel);
    z-index: 700;
    transition: height 0.3s ease;
    overflow: hidden;
    box-shadow: 0 -6px 30px rgba(0,0,0,.6);
    display: flex !important;
    flex-direction: column;
  }

  #sidebar.expanded { height: 70vh; }

  /* Handle de arrastre */
  #handle {
    width: 36px; height: 4px;
    background: #555;
    border-radius: 2px;
    margin: 8px auto 0;
    flex-shrink: 0;
    cursor: pointer;
  }

  .shead { display: none !important; }

  .stats {
    display: grid !important;
    grid-template-columns: repeat(4, 1fr) !important;
    gap: 4px;
    padding: 5px 8px;
    flex-shrink: 0;
  }
  .sc { padding: 5px 6px; }
  .sv { font-size: 15px; }
  .sl { font-size: 8px; }

  .legend { padding: 4px 10px; gap: 8px; flex-shrink: 0; }
  .li { font-size: 10px; }

  .tabs {
    flex-shrink: 0;
    background: var(--panel);
  }
  .tabs .tab { font-size: 11px; padding: 7px 4px; }

  .tcont { min-height: 0; flex: 1; }
  .lscroll { padding: 5px; }

  .ri { padding: 7px 8px; margin-bottom: 4px; }
  .rname { font-size: 11px; }
  .rmeta { font-size: 9px; }

  #det { padding: 8px 10px; gap: 5px; }
  .dtn { font-size: 14px; }
  .dtg { grid-template-columns: repeat(2, 1fr); gap: 4px; }
  .dtc { padding: 5px 7px; }
  .dtv { font-size: 13px; }

  .dist-filter { padding: 4px 6px; gap: 3px; }
  .dbtn { font-size: 9px; padding: 2px 5px; }
  #cntB { font-size: 10px; padding: 4px 8px; }

  .brig { padding: 8px 10px; margin-bottom: 5px; }
  .bn { font-size: 12px; }
  .bm { font-size: 10px; }
}
</style>
</head>

function mostrarPopup(obj) {

window.toggleIncidPopup = function(nombre) {
  for(var x=0;x<objetos.length;x++) {
    if(objetos[x].data.nombre===nombre) {
      toggleIncid(objetos[x]);
      mostrarPopup(objetos[x]); // rebind con nuevo estado
      abrirDetalle(objetos[x]);
      return;
    }
  }
};

var firebaseApp = firebase.initializeApp({
  databaseURL: "https://brigadaslegalesvos-default-rtdb.firebaseio.com"
});
var db = firebase.database();
var incidRef = db.ref('incidencias_2026');

function saveIncidencias() {
  try {
    var data = {};
    incidencias.forEach(function(o){
      var key = o.data.nombre.replace(/[.#$\[\]/]/g,'_');
      data[key] = {nombre: o.data.nombre, ts: Date.now()};
    });
    incidRef.set(data);
  } catch(e){ console.warn('Firebase save error:', e); }
}

function loadIncidencias() {
  // Listen in real time - updates on any device instantly
  incidRef.on('value', function(snapshot) {
    try {
      var data = snapshot.val() || {};
      var nombres = Object.values(data).map(function(d){ return d.nombre; });

      // Reset all first
      objetos.forEach(function(o){
        if(o.incidencia){
          o.incidencia = false;
          var c = o.data.critico ? '#ef4444' : '#22c55e';
          o.marker.setStyle({fillColor:c, color:'#111', weight:0.8, fillOpacity:0.9});
        }
      });
      incidencias = [];

      // Apply from Firebase
      nombres.forEach(function(nombre){
        for(var x=0; x<objetos.length; x++){
          if(objetos[x].data.nombre === nombre){
            objetos[x].incidencia = true;
            objetos[x].marker.setStyle({fillColor:'#facc15',color:'#f59e0b',weight:2,fillOpacity:1});
            incidencias.push(objetos[x]);
            break;
          }
        }
      });

      var n = incidencias.length;
      document.getElementById('stI').textContent = n;
      var b = document.getElementById('badgeI');
      b.textContent = n; b.style.display = n > 0 ? 'inline' : 'none';
      renderListaI(); renderListaR(objetos);

      // Update detalle sidebar if open
      if(activo){
        var btn = document.getElementById('btnI');
        btn.textContent = activo.incidencia ? '✓ INCIDENCIA ACTIVA' : '⚠ INCIDENCIA';
        btn.className = 'bincid' + (activo.incidencia ? ' on' : '');
        document.getElementById('detN').style.color = activo.incidencia ? '#facc15' : (activo.data.critico ? '#ef4444' : '#22c55e');
      }
    } catch(e){ console.warn('Firebase load error:', e); }
  });
}

function toggleIncid(obj) {
  obj.incidencia=!obj.incidencia;

var sbEl = document.getElementById('sidebar');
var handleEl = document.getElementById('handle');

function toggleSidebar(){ if(sbEl) sbEl.classList.toggle('expanded'); }
if(handleEl) handleEl.addEventListener('click', toggleSidebar);

// Expand when tapping tabs on mobile
document.querySelectorAll('.tab').forEach(function(t){
  t.addEventListener('click', function(){
    if(window.innerWidth <= 768 && sbEl) sbEl.classList.add('expanded');
  });
});

// ── SWIPE GESTURE ──
if(sbEl){
  var touchStartY = 0;
  var touchStartH = 0;
  var isDragging  = false;
  var COLLAPSED_H = 56;
  var MAX_H_VH    = 70; // 70vh

  function getMaxH(){ return Math.floor(window.innerHeight * MAX_H_VH / 100); }

  sbEl.addEventListener('touchstart', function(e){
    // only drag from handle or top 30px of sidebar
    var rect = sbEl.getBoundingClientRect();
    var touchY = e.touches[0].clientY;
    if(touchY - rect.top > 30 && e.target !== handleEl) return;
    touchStartY = touchY;
    touchStartH = sbEl.offsetHeight;
    isDragging  = true;
    sbEl.style.transition = 'none'; // disable animation while dragging
  }, {passive: true});

  sbEl.addEventListener('touchmove', function(e){
    if(!isDragging) return;
    var dy   = touchStartY - e.touches[0].clientY; // positive = swipe up
    var newH = Math.min(Math.max(touchStartH + dy, COLLAPSED_H), getMaxH());
    sbEl.style.height = newH + 'px';
  }, {passive: true});

  sbEl.addEventListener('touchend', function(e){
    if(!isDragging) return;
    isDragging = false;
    sbEl.style.transition = 'height 0.3s ease';
    var curH    = sbEl.offsetHeight;
    var midH    = (COLLAPSED_H + getMaxH()) / 2;
    // snap to expanded or collapsed
    if(curH > midH){
      sbEl.style.height = getMaxH() + 'px';
      sbEl.classList.add('expanded');
    } else {
      sbEl.style.height = COLLAPSED_H + 'px';
      sbEl.classList.remove('expanded');
    }
  }, {passive: true});
}

} catch(err){ alert('ERROR: '+err.message+'\n'+err.stack); }
